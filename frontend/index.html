<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Review Helpfulness Predictor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Review Helpfulness Predictor</h1>
        <p class="subtitle">Enter a review and let the system predict if it is helpful.</p>

        <textarea id="reviewInput" placeholder="Write your review here..."></textarea>

        <button onclick="predictReview()">Predict Helpfulness</button>

        <div id="resultBox" class="result hidden">
            <h2>Prediction Result</h2>

            <p><strong>Original Review:</strong></p>
            <div id="originalText" class="text-box"></div>

            <p><strong>Preprocessed Text:</strong></p>
            <div id="processedText" class="text-box"></div>

            <p><strong>Prediction:</strong></p>
            <div id="prediction" class="prediction"></div>

            <p><strong>Confidence:</strong></p>
            <div id="confidence" class="confidence"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
